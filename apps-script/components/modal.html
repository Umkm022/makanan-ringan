<div id="modalOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;" onclick="if(event.target===this)closeModal()">
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;" onclick="event.stopPropagation()">
    <div class="flex-between mb-2">
      <h3 id="modalTitle" style="font-size:18px;"></h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>
<script>
  function openModal(title, html) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }
</script>
