<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seblak Management - Owner</title>
  <?!= include('css/main'); ?>
  <?!= include('css/owner'); ?>
</head>
<body>
  <div class="owner-layout">
    <?!= include('components/sidebar'); ?>
    <main class="main-content" id="mainContent">
      <header class="topbar">
        <h2 id="pageTitle">Dashboard</h2>
        <div class="topbar-right">
          <span id="notifCount" class="badge" style="display:none">0</span>
          <span id="userName" class="user-name"></span>
          <button class="btn-icon" onclick="logout()">Keluar</button>
        </div>
      </header>
      <div class="content-body" id="contentBody">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>

  <?!= include('components/modal'); ?>
  <?!= include('components/toast'); ?>

  <script>
    var USER = JSON.parse(sessionStorage.getItem('seblak_user') || '{}');
    var TOKEN = sessionStorage.getItem('seblak_token');

    if (!TOKEN) window.location.href = '?page=login';

    document.getElementById('userName').textContent = USER.full_name || '';

    var pages = {
      dashboard: { title: 'Dashboard', render: renderDashboard },
      produk: { title: 'Produk', render: renderProduk },
      customer: { title: 'Customer', render: renderCustomer },
      sales: { title: 'Sales', render: renderSales },
      produksi: { title: 'Produksi', render: renderProduksi },
      stok: { title: 'Stok Gudang', render: renderStok },
      konsinyasi: { title: 'Stok Konsinyasi', render: renderKonsinyasi },
      kunjungan: { title: 'Kunjungan', render: renderKunjungan },
      invoice: { title: 'Invoice', render: renderInvoice },
      piutang: { title: 'Piutang', render: renderPiutang },
      pembayaran: { title: 'Pembayaran', render: renderPembayaran },
      komisi: { title: 'Komisi', render: renderKomisi },
      biaya: { title: 'Biaya Operasional', render: renderBiaya },
      laporan: { title: 'Laporan', render: renderLaporan },
      setting: { title: 'Setting', render: renderSetting }
    };

    function navigate(page) {
      document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
      var nav = document.getElementById('nav-' + page);
      if (nav) nav.classList.add('active');
      if (pages[page]) {
        document.getElementById('pageTitle').textContent = pages[page].title;
        pages[page].render();
      }
    }

    function logout() {
      google.script.run
        .withSuccessHandler(function() {
          sessionStorage.clear();
          window.location.href = '?page=login';
        })
        .destroySession(TOKEN);
    }

    function api(action, params, callback) {
      params = params || {};
      params.action = action;
      params.token = TOKEN;
      google.script.run
        .withSuccessHandler(callback)
        .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })
        .doPost(JSON.stringify(params));
    }

    // Initialize
    navigate('dashboard');
  </script>
  <script>
    <?!= include('js/api'); ?>
    <?!= include('js/utils'); ?>
    <?!= include('js/dashboard-owner'); ?>
  </script>
</body>
</html>
