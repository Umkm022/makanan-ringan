<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - Seblak System</title>
  <?!= include('css/main'); ?>
  <style>
    .setup-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .setup-step { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .step-dot.active { background: #C62828; color: #fff; }
    .step-dot.done { background: #2E7D32; color: #fff; }
    .step-dot { background: #E0E0E0; color: #9E9E9E; }
  </style>
</head>
<body>
  <div class="setup-container">
    <div style="text-align:center;margin-bottom:24px;">
      <h1>🍜 Setup Awal Sistem</h1>
      <p style="color:#757575;">Lengkapi data berikut untuk memulai</p>
    </div>
    <div class="step-indicator" id="stepIndicator"></div>
    <div class="setup-step" id="setupBody"></div>
  </div>
  <script>
    var TOKEN = sessionStorage.getItem('seblak_token');
    var currentStep = 1;
    var totalSteps = 8;
    var setupData = {};

    function renderStep() {
      var indicator = document.getElementById('stepIndicator');
      var html = '';
      for (var i = 1; i <= totalSteps; i++) {
        var cls = 'step-dot';
        if (i === currentStep) cls += ' active';
        else if (i < currentStep) cls += ' done';
        html += '<div class="' + cls + '">' + (i < currentStep ? '✓' : i) + '</div>';
      }
      indicator.innerHTML = html;
      loadStepContent();
    }

    function loadStepContent() {
      var body = document.getElementById('setupBody');
      var html = '<h3 style="margin-bottom:16px;">Langkah ' + currentStep + ' dari ' + totalSteps + '</h3>';
      switch(currentStep) {
        case 1:
          html += '<p style="color:#757575;margin-bottom:16px;">Profil Perusahaan</p>';
          html += '<label>Nama Perusahaan</label><input id="s_nama" style="margin-bottom:12px;">';
          html += '<label>Alamat</label><input id="s_alamat" style="margin-bottom:12px;">';
          html += '<label>Telepon</label><input id="s_telp" style="margin-bottom:12px;">';
          html += '<label>Email</label><input id="s_email" type="email" style="margin-bottom:12px;">';
          break;
        case 2:
          html += '<p style="color:#757575;margin-bottom:16px;">Data Sales (tambah sales pertama)</p>';
          html += '<label>Nama Sales</label><input id="s_sales_name" style="margin-bottom:12px;">';
          html += '<label>Telepon</label><input id="s_sales_telp" style="margin-bottom:12px;">';
          html += '<label>Username</label><input id="s_sales_user" style="margin-bottom:12px;">';
          html += '<label>Password</label><input id="s_sales_pass" type="password" style="margin-bottom:12px;">';
          break;
        case 3:
          html += '<p style="color:#757575;margin-bottom:16px;">Data Produk</p>';
          html += '<label>Nama Produk</label><input id="s_produk_name" style="margin-bottom:12px;">';
          html += '<label>Varian</label><input id="s_produk_varian" style="margin-bottom:12px;">';
          html += '<label>Harga Jual (Rp)</label><input id="s_produk_harga" type="number" style="margin-bottom:12px;">';
          html += '<label>HPP (Rp)</label><input id="s_produk_hpp" type="number" style="margin-bottom:12px;">';
          break;
        default:
          html += '<p style="color:#757575;">Langkah selanjutnya akan diimplementasikan.</p>';
      }
      html += '<div class="flex" style="gap:8px;margin-top:24px;">';
      if (currentStep > 1) html += '<button class="btn btn-outline" onclick="prevStep()">← Kembali</button>';
      if (currentStep < totalSteps) html += '<button class="btn btn-primary" onclick="nextStep()">Lanjut →</button>';
      else html += '<button class="btn btn-primary" onclick="finishSetup()">✓ Selesai</button>';
      html += '</div>';
      body.innerHTML = html;
    }

    function nextStep() { saveStepData(); currentStep++; renderStep(); }
    function prevStep() { currentStep--; renderStep(); }
    function saveStepData() { /* TODO: save per-step data */ }
    function finishSetup() { showToast('Setup selesai! 🎉', 'success'); setTimeout(function() { window.location.href = '?page=login'; }, 1500); }

    renderStep();
  </script>
  <script><?!= include('js/utils'); ?><?!= include('js/api'); ?></script>
</body>
</html>
